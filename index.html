<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Braves Imperialism</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="header-inner">
      <div class="logo-block">
        <div class="tomahawk">🪓</div>
        <div>
          <h1>BRAVES IMPERIALISM</h1>
          <p class="subtitle">Depth Chart Tracker</p>
        </div>
      </div>
      <div class="header-meta">
        <span id="last-updated">—</span>
      </div>
    </div>
  </header>

  <main class="container">

    <!-- HITTERS -->
    <section class="roster-section">
      <div class="section-label">
        <span class="section-badge hitters-badge">LINEUP</span>
        <h2>Position Players</h2>
      </div>
      <div id="hitters-field" class="field"></div>
    </section>

    <!-- ROTATION -->
    <section class="roster-section">
      <div class="section-label">
        <span class="section-badge pitchers-badge">ROTATION</span>
        <h2>Starting Pitchers</h2>
      </div>
      <div id="rotation-field" class="field"></div>
    </section>

    <!-- BULLPEN -->
    <section class="roster-section">
      <div class="section-label">
        <span class="section-badge bullpen-badge">BULLPEN</span>
        <h2>Relief Pitchers</h2>
      </div>
      <div id="bullpen-field" class="field"></div>
    </section>

    <div class="legend">
      <span class="star">★</span> = Protected Player &nbsp;|&nbsp;
      <span class="stat-label ops-color">OPS</span> = On-base + Slugging &nbsp;|&nbsp;
      <span class="stat-label era-color">ERA</span> = Earned Run Average
    </div>

  </main>

  <script src="app.js"></script>
</body>
</html>
